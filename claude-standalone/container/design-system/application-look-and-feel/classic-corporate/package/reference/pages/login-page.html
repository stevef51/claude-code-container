<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HealthClean - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: 0 0% 100%;
      --foreground: 222 47% 11%;
      --card: 0 0% 100%;
      --card-foreground: 222 47% 11%;
      --popover: 0 0% 100%;
      --popover-foreground: 222 47% 11%;
      --primary: 217 87% 17%;
      --primary-foreground: 0 0% 100%;
      --secondary: 210 40% 96%;
      --secondary-foreground: 222 47% 11%;
      --muted: 210 40% 96%;
      --muted-foreground: 215 16% 47%;
      --accent: 187 85% 43%;
      --accent-foreground: 222 47% 11%;
      --destructive: 0 84% 60%;
      --destructive-foreground: 0 0% 100%;
      --border: 214 32% 91%;
      --input: 214 32% 91%;
      --ring: 217 87% 17%;
      --radius: 0.5rem;
    }

    * {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    .login-input {
      transition: all 0.2s ease-in-out;
    }

    .login-input:focus {
      border-color: hsl(var(--accent));
      box-shadow: 0 0 0 3px hsl(var(--accent) / 0.15);
    }

    .login-button {
      background: linear-gradient(135deg, #052252 0%, #0a3a7a 100%);
      transition: all 0.2s ease-in-out;
    }

    .login-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px hsl(217 87% 17% / 0.4);
    }

    .login-button:active {
      transform: translateY(0);
    }

    .fade-in {
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .slide-up {
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body class="min-h-screen bg-white flex flex-col" data-element-id="login-page">
  
  <!-- Header with Logo -->
  <header class="w-full py-6 px-8 border-b border-slate-100 bg-white" data-element-id="header">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-4" data-element-id="logo-container">
        <img src="./images/vm-logo.png" alt="Virtual Manager Logo" class="h-12 w-auto" data-element-id="company-logo">
        <img src="./images/virtual-mgr-text.png" alt="Virtual Manager" class="h-8 w-auto" data-element-id="company-text">
      </div>
      <span class="text-sm text-slate-500 font-medium" data-element-id="product-tag">HealthClean™</span>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 flex items-center justify-center px-4 sm:px-6 lg:px-8 py-12" data-element-id="main-content">
    <div class="w-full max-w-md fade-in" data-element-id="login-container">
      
      <!-- Login Card -->
      <div class="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden slide-up" data-element-id="login-card">
        
        <!-- Card Header -->
        <div class="px-8 pt-8 pb-6 text-center border-b border-slate-100" data-element-id="card-header">
          <h1 class="text-2xl font-semibold text-slate-900 tracking-tight" data-element-id="login-title">
            Welcome Back
          </h1>
          <p class="mt-2 text-sm text-slate-500" data-element-id="login-subtitle">
            Sign in to manage your EVS operations
          </p>
        </div>

        <!-- Login Form -->
        <form class="px-8 py-6 space-y-5" data-element-id="login-form" onsubmit="event.preventDefault();">
          
          <!-- Email Field -->
          <div data-element-id="email-field">
            <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5" data-element-id="email-label">
              Email Address
            </label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="h-5 w-5 text-slate-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" data-element-id="email-icon">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                </svg>
              </div>
              <input 
                type="email" 
                id="email" 
                name="email" 
                required
                class="login-input block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg text-slate-900 placeholder-slate-400 focus:outline-none focus:border-cyan-500 focus:ring-0 text-sm"
                placeholder="you@hospital.com"
                data-element-id="email-input"
              >
            </div>
          </div>

          <!-- Password Field -->
          <div data-element-id="password-field">
            <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5" data-element-id="password-label">
              Password
            </label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="h-5 w-5 text-slate-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" data-element-id="password-icon">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
              </div>
              <input 
                type="password" 
                id="password" 
                name="password" 
                required
                class="login-input block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg text-slate-900 placeholder-slate-400 focus:outline-none focus:border-cyan-500 focus:ring-0 text-sm"
                placeholder="Enter your password"
                data-element-id="password-input"
              >
            </div>
          </div>

          <!-- Remember Me & Forgot Password -->
          <div class="flex items-center justify-between" data-element-id="options-row">
            <label class="flex items-center cursor-pointer" data-element-id="remember-me-label">
              <input 
                type="checkbox" 
                id="remember" 
                name="remember"
                class="h-4 w-4 text-[#052252] border-slate-300 rounded focus:ring-[#052252] focus:ring-offset-0 transition-colors"
                data-element-id="remember-checkbox"
              >
              <span class="ml-2 text-sm text-slate-600" data-element-id="remember-text">Remember me</span>
            </label>
            <a href="#" class="text-sm font-medium text-[#052252] hover:text-cyan-600 transition-colors" data-element-id="forgot-password-link">
              Forgot password?
            </a>
          </div>

          <!-- Submit Button -->
          <button 
            type="submit" 
            class="login-button w-full flex items-center justify-center py-2.5 px-4 border border-transparent rounded-lg text-sm font-semibold text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#052252]"
            data-element-id="login-button"
          >
            Sign In
          </button>

        </form>

        <!-- Divider -->
        <div class="px-8 pb-6" data-element-id="divider">
          <div class="relative">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-slate-200"></div>
            </div>
            <div class="relative flex justify-center text-sm">
              <span class="px-2 bg-white text-slate-500" data-element-id="divider-text">Or continue with</span>
            </div>
          </div>
        </div>

        <!-- SSO Buttons -->
        <div class="px-8 pb-8 grid grid-cols-2 gap-3" data-element-id="sso-buttons">
          <button 
            type="button"
            class="flex items-center justify-center px-4 py-2 border border-slate-300 rounded-lg shadow-sm bg-white text-sm font-medium text-slate-700 hover:bg-slate-50 hover:border-slate-400 transition-all"
            data-element-id="microsoft-sso-button"
          >
            <svg class="h-5 w-5 mr-2" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M10 0H0V10H10V0Z" fill="#F25022"/>
              <path d="M21 0H11V10H21V0Z" fill="#7FBA00"/>
              <path d="M10 11H0V21H10V11Z" fill="#00A4EF"/>
              <path d="M21 11H11V21H21V11Z" fill="#FFB900"/>
            </svg>
            Microsoft
          </button>
          <button 
            type="button"
            class="flex items-center justify-center px-4 py-2 border border-slate-300 rounded-lg shadow-sm bg-white text-sm font-medium text-slate-700 hover:bg-slate-50 hover:border-slate-400 transition-all"
            data-element-id="google-sso-button"
          >
            <svg class="h-5 w-5 mr-2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google
          </button>
        </div>

      </div>

      <!-- Footer Links -->
      <div class="mt-6 text-center space-y-2" data-element-id="footer-links">
        <p class="text-sm text-slate-500" data-element-id="help-text">
          Need help? <a href="#" class="font-medium text-[#052252] hover:text-cyan-600 transition-colors" data-element-id="support-link">Contact Support</a>
        </p>
        <p class="text-xs text-slate-400" data-element-id="copyright">
          © 2025 Virtual Manager. All rights reserved.
        </p>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full py-4 px-8 border-t border-slate-100 bg-slate-50" data-element-id="footer">
    <div class="max-w-7xl mx-auto flex items-center justify-center gap-6 text-sm text-slate-500" data-element-id="footer-content">
      <a href="#" class="hover:text-[#052252] transition-colors" data-element-id="privacy-link">Privacy Policy</a>
      <span class="text-slate-300">|</span>
      <a href="#" class="hover:text-[#052252] transition-colors" data-element-id="terms-link">Terms of Service</a>
      <span class="text-slate-300">|</span>
      <a href="#" class="hover:text-[#052252] transition-colors" data-element-id="security-link">Security</a>
    </div>
  </footer>

</body>
</html>
